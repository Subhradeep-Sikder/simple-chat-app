name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Tests & Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: TypeScript type checking
        run: npx tsc --noEmit
        working-directory: backend

      - name: Lint backend code
        run: npx eslint . --ext .ts 2>/dev/null || echo "No ESLint configured yet"
        working-directory: backend
        continue-on-error: true

  frontend:
    name: Frontend Tests & Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type checking
        run: npm run build -- --noEmit 2>&1 | grep -E "(error|Error)" || npx tsc --noEmit
        working-directory: frontend
        continue-on-error: true

      - name: ESLint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ matrix.node-version }}
          path: frontend/dist
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (backend)
        run: npm audit --omit=dev --audit-level=high 2>/dev/null || echo "Audit issues found"
        working-directory: backend
        continue-on-error: true

      - name: Run npm audit (frontend)
        run: npm audit --omit=dev --audit-level=high 2>/dev/null || echo "Audit issues found"
        working-directory: frontend
        continue-on-error: true

  code-quality:
    name: Code Quality & Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README exists
        run: test -f README.md && echo "✓ README.md found" || exit 1

      - name: Check .gitignore
        run: test -f .gitignore && echo "✓ .gitignore found" || exit 1

      - name: Check package.json files
        run: |
          test -f backend/package.json && echo "✓ backend/package.json found" || exit 1
          test -f frontend/package.json && echo "✓ frontend/package.json found" || exit 1

  success:
    name: CI Pipeline Status
    runs-on: ubuntu-latest
    needs: [backend, frontend, security-scan, code-quality]
    if: always()

    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ needs.backend.result }}" == "failure" ] || \
             [ "${{ needs.frontend.result }}" == "failure" ] || \
             [ "${{ needs.code-quality.result }}" == "failure" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ CI Pipeline Passed"
          fi
