name: Scheduled Checks

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Backend security audit
        run: |
          cd backend
          npm install
          npm audit --production 2>&1 || true

      - name: Frontend security audit
        run: |
          cd frontend
          npm install
          npm audit --production 2>&1 || true

  dependency-check:
    name: Check Dependency Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Check outdated dependencies (backend)
        run: |
          cd backend
          npm outdated || true

      - name: Check outdated dependencies (frontend)
        run: |
          cd frontend
          npm outdated || true

  full-build-test:
    name: Full Build Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Backend build
        run: |
          cd backend
          npm ci
          npx tsc --noEmit

      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build

  code-coverage:
    name: Code Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Generate coverage report
        run: |
          echo "⚠️  Coverage reporting not yet configured"
          echo "Add jest or vitest to your project to generate coverage reports"
